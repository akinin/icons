<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AHS Icons</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="hero">
    <button id="brand-picker" class="brand" type="button" title="Выбрать логотип">
      <h1><img id="brand-logo" class="brand-logo" alt="" hidden>AHS Icons</h1>
      <p id="summary">Загрузка...</p>
    </button>
  </header>

  <main class="container">
    <section id="dropzone" class="dropzone">
      <div>
        <strong>Перетащите SVG, PNG или ICO сюда</strong>
        <span>Одинаковые имена объединятся в одну карточку, разные имена создадут несколько карточек.</span>
      </div>
      <button id="pick-files" type="button">Выбрать файлы</button>
      <input id="file-input" type="file" accept=".svg,.png,.ico,image/svg+xml,image/png,image/x-icon" multiple hidden>
    </section>

    <section class="toolbar">
      <input id="search" type="search" placeholder="Поиск по названию">
      <select id="format-filter">
        <option value="">Все форматы</option>
        <option value="svg">SVG</option>
        <option value="png">PNG</option>
        <option value="ico">ICO</option>
      </select>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <dialog id="preview-dialog">
    <div class="preview-dialog">
      <button class="modal-close" type="button" id="close-preview" aria-label="Закрыть">×</button>
      <div class="modal-preview">
        <img id="preview-image" alt="">
        <h2 id="preview-title"></h2>
      </div>
      <div class="modal-actions">
        <div id="preview-formats" class="modal-format-buttons"></div>
      </div>
    </div>
  </dialog>

  <dialog id="logo-dialog">
    <div class="preview-dialog">
      <button class="modal-close" type="button" id="close-logo-dialog" aria-label="Закрыть">×</button>
      <h2>Логотип AHS Icons</h2>
      <div id="logo-options" class="logo-options"></div>
    </div>
  </dialog>

  <dialog id="editor">
    <form id="editor-form" method="dialog">
      <header class="dialog-header">
        <h2 id="dialog-title">Иконка</h2>
        <button class="modal-close inline-close" value="cancel" type="button" id="close-dialog" aria-label="Закрыть">×</button>
      </header>

      <label>
        Название
        <input id="icon-name" name="name" type="text" required autocomplete="off">
      </label>

      <label>
        Файлы
        <span class="file-picker">
          <button id="pick-edit-files" type="button">Выбрать файлы</button>
          <span id="edit-file-summary">Файлы не выбраны</span>
          <input id="icon-files" name="files" type="file" accept=".svg,.png,.ico,image/svg+xml,image/png,image/x-icon" multiple hidden>
        </span>
      </label>

      <div id="current-formats" class="format-row"></div>

      <footer class="dialog-actions">
        <button id="delete-icon" class="danger" type="button">Удалить</button>
        <span></span>
        <button type="button" id="cancel-edit">Отмена</button>
        <button class="primary" type="submit">Сохранить</button>
      </footer>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
